services:
  # O Coletor centraliza o recebimento e exportação
  otel-collector:
    image: otel/opentelemetry-collector-contrib
    volumes:
      - ./otel-config.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

  # Exemplo de backend para Tracing
  jaeger:
    image: jaegertracing/all-in-one
    ports:
      - "16686:16686" # UI

  # Exemplo de backend para Métricas
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9190:9090"
