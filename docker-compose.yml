services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib
    volumes:
      - ./otel-config.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317" # gRPC
      - "4318:4318" # HTTP

  jaeger:
    image: jaegertracing/all-in-one
    ports:
      - "16686:16686" # UI do Jaeger
